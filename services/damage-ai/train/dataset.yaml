# YOLO-seg dataset config for the CarDD-fine-tuned damage model.
#
# `path` points at the YOLO-seg dataset produced by prepare_cardd.py:
#   data/cardd/
#     images/{train,val}/   *.jpg
#     labels/{train,val}/   *.txt  (one row/instance: `cls x1 y1 x2 y2 ... xn yn`
#                                    normalized polygon — segmentation, not boxes)
#
# Class order MUST match app/inference.py CARDD_CLASSES.

path: ../data/cardd       # dataset root (relative to this file)
train: images/train
val: images/val

names:
  0: dent
  1: scratch
  2: crack
  3: glass shatter
  4: lamp broken
  5: tire flat
